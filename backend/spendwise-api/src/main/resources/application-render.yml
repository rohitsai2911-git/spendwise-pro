server:
  port: ${PORT:8080}

spring:
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: 1025
    username:
    password:

  datasource:
    url: jdbc:h2:mem:spendwise;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    open-in-view: false

  sql:
    init:
      mode: never

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A47}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,https://rohitsai2911-git.github.io}

  upload:
    dir: /tmp/uploads

logging:
  level:
    com.spendwise: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
